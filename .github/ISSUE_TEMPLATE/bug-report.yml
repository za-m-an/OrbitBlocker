name: Bug Report
description: Report a bug in ZN blocker
title: "Bug: <short summary>"
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear description of the problem.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide exact steps.
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and Version
      placeholder: Chrome 135 / Edge 134
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Logs, Screenshots, and Links
      description: Include diagnostics and URLs where possible.
